<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="description" content="Muzyka – odtwarzacz muzyki PWA" />
  <title>Muzyka</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>&#9835; Muzyka</h1>
      <button id="btn-install" class="btn-install" hidden>Zainstaluj aplikację</button>
    </header>

    <main>
      <section class="player-card">
        <div class="album-art" id="album-art">
          <div class="album-placeholder">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <circle cx="50" cy="50" r="48" fill="#16213e" stroke="#e94560" stroke-width="2"/>
              <circle cx="50" cy="50" r="15" fill="#0f3460"/>
              <circle cx="50" cy="50" r="5" fill="#e94560"/>
            </svg>
          </div>
        </div>

        <div class="track-info">
          <p class="track-title" id="track-title">Wybierz utwór</p>
          <p class="track-artist" id="track-artist">–</p>
        </div>

        <div class="progress-container">
          <span class="time" id="time-current">0:00</span>
          <input type="range" id="progress" class="progress-bar" value="0" min="0" max="100" step="0.1" />
          <span class="time" id="time-total">0:00</span>
        </div>

        <div class="controls">
          <button class="ctrl-btn" id="btn-shuffle" title="Losowo">&#9783;</button>
          <button class="ctrl-btn" id="btn-prev" title="Poprzedni">&#9664;&#9664;</button>
          <button class="ctrl-btn play-btn" id="btn-play" title="Odtwórz">&#9654;</button>
          <button class="ctrl-btn" id="btn-next" title="Następny">&#9654;&#9654;</button>
          <button class="ctrl-btn" id="btn-repeat" title="Powtarzaj">&#10227;</button>
        </div>

        <div class="volume-container">
          <svg class="vol-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" fill="currentColor"/></svg>
          <input type="range" id="volume" class="volume-bar" value="80" min="0" max="100" />
          <svg class="vol-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" fill="currentColor"/></svg>
        </div>
      </section>

      <section class="playlist-section">
        <div class="playlist-header">
          <h2>Playlista</h2>
          <label class="btn-add" title="Dodaj pliki">
            &#43; Dodaj muzykę
            <input type="file" id="file-input" accept="audio/*" multiple hidden />
          </label>
        </div>
        <ul class="playlist" id="playlist"></ul>
        <p class="empty-hint" id="empty-hint">Kliknij „Dodaj muzykę”, aby wczytać pliki audio z urządzenia.</p>
      </section>
    </main>
  </div>

  <audio id="audio-player"></audio>
  <script src="app.js"></script>
</body>
</html>
